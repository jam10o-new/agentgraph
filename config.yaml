# AgentGraph Configuration Template
#
# OUTPUT SEMANTICS:
# - output: Optional directory for final assistant response files. If present, the complete
#   inference result is written here when a turn finishes.
# - stream_output: Optional directory for live streaming of assistant tokens as they are
#   generated. If present, tokens are written in real-time to this directory.
# - If both are present, both final output AND streaming output are written.
# - If only stream_output is present, only streaming output is written (no final output file).
# - If neither are present, the agent runs inference without writing any output files
#   (useful for pure tool execution agents).
# - tool_output: Optional separate directory for tool execution results (keeps output clean).
#   Falls back to `output` if not set.

# 1. Model Definitions
models:
  primary:
    id: "gemma4-12B"
    builder: "vision"
    path: "google/gemma-4-12B-it"
    isq: "4"
    # Optional: Path to a .json chat template or a literal Jinja string, which overrides any provided template.
    # Defaults to model-provided if available.
    # chat_template: "path/to/chatml.json"
  vision:
    id: "qwen35"
    builder: "vision"
    path: "Qwen/Qwen3.5-9B"
    isq: "4"

# 2. Agent Definitions
agents:
  researcher:
    # A list of directories to watch for user input
    inputs:
      - "agents/researcher/input"
    # Primary output directory. Written only at turn completion (or interrupt).
    # Other agents should watch this directory for triggered downstream work.
    # May be omitted if using only stream_output or pure tool execution.
    output: "agents/researcher/output"
    # Optional: live-streaming output directory for watching tokens in real-time.
    stream_output: "agents/researcher/stream"
    # A list of directories containing system prompts and skills
    system:
      - "agents/researcher/system"
    model: "primary"
    history_limit: 20
    compression:
      threshold: 0.5
      inverse_probability: 0.9
      resummarize_probability: 0.05
    context_checkpoint_limit: 20000
    # Optional: separate directory for tool results. Keeps main output clean.
    tool_output: "agents/researcher/tools"
    # Inputs listed here are never compressed or folded into metasummaries.
    # Use for ephemeral/mutable inputs that must always reach the model verbatim.
    excluded_from_summary: []
    # Tool binaries to make available to this agent (empty list = no tools).
    # Each entry is the full binary name (e.g. ag-tool-bash, ag-tool-read).
    # Built-in tool binaries: ag-tool-bash, ag-tool-read, ag-tool-ls,
    #   ag-tool-skills, ag-tool-load-skill, ag-tool-loadctx, ag-tool-spawn
    tools:
      - ag-tool-bash
      - ag-tool-read
      - ag-tool-ls
    sampling:
      temperature: 0.7
      top_p: 0.9
      top_k: 40
      max_len: 2048

  # Example: stream-only agent (no final output files, only live streaming)
  stream_watcher:
    inputs:
      - "agents/stream_watcher/input"
    stream_output: "agents/stream_watcher/stream"
    system:
      - "agents/stream_watcher/system"
    model: "primary"
    history_limit: 10
    tools: []
    sampling:
      temperature: 0.7
      top_p: 0.9
      max_len: 1024

  # Example: thinking agent with chain-of-thought / extended reasoning enabled.
  # This agent has no tools; it's useful for validation and testing reasoning.
  thinker:
    inputs:
      - "agents/thinker/input"
    output: "agents/thinker/output"
    stream_output: "agents/thinker/stream"
    system:
      - "agents/thinker/system"
    model: "primary"
    enable_thinking: true
    history_limit: 10
    tools: []
    sampling:
      temperature: 0.7
      top_p: 0.9
      max_len: 2048

  # Example: pure tool-execution agent (no output files at all, just runs tools)
  tool_runner:
    inputs:
      - "agents/tool_runner/input"
    system:
      - "agents/tool_runner/system"
    model: "primary"
    history_limit: 0
    tool_output: "agents/tool_runner/tools"
    tools:
      - ag-tool-bash
      - ag-tool-read
      - ag-tool-ls
    sampling:
      temperature: 0.2
      max_len: 512

  coder:
    inputs:
      - "agents/coder/input"
      - "agents/researcher/output" # Colony: watches researcher's output
    output: "agents/coder/output"
    # Secondary human-readable streaming output in addition to the primary output above.
    stream_output: "agents/coder/stream"
    system:
      - "agents/coder/system"
    model: "primary"
    history_limit: 50
    compression:
      threshold: 0.5
      inverse_probability: 0.9
      resummarize_probability: 0.05
    context_checkpoint_limit: 40000
    tool_output: "agents/coder/tools"
    excluded_from_summary: []
    tools:
      - ag-tool-bash
      - ag-tool-read
      - ag-tool-ls
      - ag-tool-skills
      - ag-tool-load-skill
      - ag-tool-loadctx
      - ag-tool-spawn
    sampling:
      temperature: 0.2
      top_p: 0.95
      top_k: 50
      max_len: 4096

# 3. Tool Configuration (Plugin System)
#   AgentGraph discovers tool binaries from PATH using the `ag-tool-*` naming convention.
#   Each binary must support three modes:
#     --describe → prints JSON Function schema (used for model tool definitions)
#     --help     → prints guidance text (appended to the system prompt)
#     default    → reads JSON arguments from stdin, writes result to stdout
#   An empty list (or omitting 'tools') disables tools entirely.
#   Built-in tools: ag-tool-bash, ag-tool-read, ag-tool-ls, ag-tool-skills,
#                    ag-tool-load-skill, ag-tool-loadctx, ag-tool-spawn
#
# 4. API Plugin Configuration (similar convention)
#   Any top-level key matching `api-*` is treated as an API frontend section.
#   The leader spawns `ag-api-<name>` binaries from PATH, passing `--config`,
#   `--socket`, and `--section <json>` arguments.
#   Third-party plugins follow the same convention without leader changes.
api-http:
  bind_address: "127.0.0.1"
  port: 3000

api-telegram:
  bot_token: "..."
  default_agent: "api"
  user_agents:
    "123456789": "special_agent"
  group_agents:
    "-100123456789": "group_agent"
  channel_agents:
    "-100987654321": "channel_agent"

# 5. Global Settings
shutdown_on_idle: ~
