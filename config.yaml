# AgentGraph Configuration Template

# 1. Model Definitions
models:
  primary:
    id: "gemma-4-E4B"
    builder: "vision"
    path: "google/gemma-4-E4B"
    isq: "4"
  vision:
    id: "qwen3-vl-8b"
    builder: "vision"
    path: "Qwen/Qwen3-VL-8B-Instruct"
    isq: "4"

# 2. Global Sampling Parameters
sampling:
  temperature: 0.7
  top_p: 0.9
  top_k: 40
  max_len: 2048

# 3. Agent Definitions
agents:
  researcher:
    # A list of directories to watch for user input
    inputs:
      - "agents/researcher/input"
    # A single directory to write assistant responses
    output: "agents/researcher/output"
    # A list of directories containing system prompts and skills
    system:
      - "agents/researcher/system"
    model: "primary"
    history_limit: 20
    stream: true

  coder:
    inputs:
      - "agents/coder/input"
      - "agents/researcher/output" # Colony: watches researcher's output
    output: "agents/coder/output"
    system:
      - "agents/coder/system"
    model: "primary"
    history_limit: 50
    stream: true

# 4. Context Compression Settings
compression:
  threshold: 0.5
  inverse_probability: 0.9
  resummarize_probability: 0.1

# 5. Global Settings
shutdown_on_idle: false
