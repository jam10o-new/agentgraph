# AgentGraph Configuration Template

# 1. Model Definitions
models:
  primary:
    id: "gemma-4-E4B"
    builder: "vision"
    path: "google/gemma-4-E4B-it"
    isq: "4"
    # Optional: Path to a .json chat template or a literal Jinja string, which overrides any provided template.
    # Defaults to model-provided if available.
    # chat_template: "path/to/chatml.json"
  vision:
    id: "qwen35"
    builder: "vision"
    path: "Qwen/Qwen3.5-9B"
    isq: "4"

# 2. Agent Definitions
agents:
  researcher:
    # A list of directories to watch for user input
    inputs:
      - "agents/researcher/input"
    # A single directory to write assistant responses
    output: "agents/researcher/output"
    # A list of directories containing system prompts and skills
    system:
      - "agents/researcher/system"
    model: "primary"
    history_limit: 20
    # Controls whether output is written to file token-by-token (true) or only at completion (false).
    # Set to false for agents whose output triggers other agents to prevent "interrupt storms".
    stream: false
    sampling:
      temperature: 0.7
      top_p: 0.9
      top_k: 40
      max_len: 2048

  coder:
    inputs:
      - "agents/coder/input"
      - "agents/researcher/output" # Colony: watches researcher's output
    output: "agents/coder/output"
    system:
      - "agents/coder/system"
    model: "primary"
    history_limit: 50
    stream: true
    sampling:
      temperature: 0.2
      top_p: 0.95
      top_k: 50
      max_len: 4096

# 4. Context Compression Settings
# Probabilistic summarization logic: older turns (deeper depth) are more likely to be compressed.
compression:
  # Base probability threshold. Turns with (1.0 - inv_prob^depth) > threshold are compressed.
  threshold: 0.5
  # Recency factor. 0.9 means 10% prob of compression at depth 1, increasing with depth.
  inverse_probability: 0.9
  # Chance to re-summarize a cached entry to refine it with more context.
  resummarize_probability: 0.05

# 5. Global Settings
shutdown_on_idle: false
