# AgentGraph Configuration Template

# 1. Model Definitions
models:
  primary:
    id: "gemma-4-E4B"
    builder: "vision"
    path: "google/gemma-4-E4B-it"
    isq: "4"
    # Optional: Path to a .json chat template or a literal Jinja string, which overrides any provided template.
    # Defaults to model-provided if available.
    # chat_template: "path/to/chatml.json"
  vision:
    id: "qwen35"
    builder: "vision"
    path: "Qwen/Qwen3.5-9B"
    isq: "4"

# 2. Agent Definitions
agents:
  researcher:
    # A list of directories to watch for user input
    inputs:
      - "agents/researcher/input"
    # A single directory to write assistant responses
    output: "agents/researcher/output"
    # A list of directories containing system prompts and skills
    system:
      - "agents/researcher/system"
    model: "primary"
    history_limit: 20
    # No stream_output means the agent only writes final output.
    # Use stream_output for agents you want to watch live.
    compression:
      threshold: 0.5
      inverse_probability: 0.9
      resummarize_probability: 0.05
    context_checkpoint_limit: 20000
    # Optional: separate directory for tool results. Keeps main output clean.
    tool_output: "agents/researcher/tools"
    # Inputs listed here are never compressed or folded into metasummaries.
    # Use for ephemeral/mutable inputs that must always reach the model verbatim.
    excluded_from_summary: []
    # Allow this agent to use tools (execute_command, read_file, etc.)
    tools_enabled: true
    sampling:
      temperature: 0.7
      top_p: 0.9
      top_k: 40
      max_len: 2048

  coder:
    inputs:
      - "agents/coder/input"
      - "agents/researcher/output" # Colony: watches researcher's output
    output: "agents/coder/output"
    # Secondary human-readable streaming output in addition to the primary output above.
    stream_output: "agents/coder/stream"
    system:
      - "agents/coder/system"
    model: "primary"
    history_limit: 50
    compression:
      threshold: 0.5
      inverse_probability: 0.9
      resummarize_probability: 0.05
    context_checkpoint_limit: 40000
    tool_output: "agents/coder/tools"
    excluded_from_summary: []
    tools_enabled: true
    sampling:
      temperature: 0.2
      top_p: 0.95
      top_k: 50
      max_len: 4096

# 3. OpenAI-compatible API Server (optional)
# When enabled, each configured agent is exposed as a "model" via the API.
# Messages sent via /v1/chat/completions are written to the agent's first input
# directory, and responses are read from the output directory.
api:
  enabled: false
  bind_address: "127.0.0.1"
  port: 3000

# 4. Global Settings
shutdown_on_idle: false
